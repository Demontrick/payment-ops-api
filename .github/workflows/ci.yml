name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: payment_ops_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      RAILS_ENV: test
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/payment_ops_test
      REDIS_URL: redis://localhost:6379/0

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.2
          bundler-cache: true

      - name: Install dependencies
        run: bundle install

      # ✅ FIX 1: Ensure DB is created before migrate/prepare
      - name: Setup test database
        run: |
          bundle exec rails db:create db:schema:load

      # ✅ FIX 2: Fail fast if Sidekiq-related code depends on Redis
      - name: Verify Redis connectivity (safe check)
        run: |
          ruby -e "require 'redis'; r = Redis.new(url: ENV['REDIS_URL']); puts r.ping"

      - name: Run RSpec
        run: bundle exec rspec